<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tank Battle</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d0d0a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: monospace;
      }

      #wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        /* Scale the whole wrapper to fit viewport while keeping aspect ratio */
        max-width: 100vw;
        max-height: 100vh;
      }

      #title-bar {
        color: #4a7a28;
        font-size: 11px;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 6px;
        opacity: 0.7;
        flex-shrink: 0;
      }

      #canvas-wrap {
        position: relative;
        flex-shrink: 1;
        /* Let the canvas shrink if needed */
        max-width: 100vw;
        max-height: calc(100vh - 28px); /* leave room for title bar */
        display: flex;
      }

      #canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        border: 2px solid #2a4a18;
        box-shadow:
          0 0 0 1px #1a2a10,
          0 0 30px rgba(60, 120, 30, 0.25),
          0 0 80px rgba(30, 60, 15, 0.15);
        cursor: crosshair;
      }

      /* Search input — positioned by JS to overlay the canvas */
      #room-search {
        position: fixed;
        box-sizing: border-box;
        background: transparent;
        color: #b8d090;
        border: none;
        outline: none;
        font-family: monospace;
        caret-color: #6aaa40;
        z-index: 10;
        padding: 4px 8px;
      }
      #room-search::placeholder { color: #3a5a30; }
      #room-search::selection { background: rgba(60,140,30,0.4); }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <div id="title-bar">⬛ TANK BATTLE — MULTIPLAYER ⬛</div>
      <div id="canvas-wrap">
        <canvas id="canvas"></canvas>
      </div>
    </div>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
